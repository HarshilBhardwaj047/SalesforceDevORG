# This GitHub Actions workflow cherry‑picks pull requests that are merged into branch
# A and have titles starting with "Cherry" into branch B automatically.  When a pull
# request targeting branch A is closed (merged), the job checks if the PR was
# actually merged and if its title starts with the prefix "Cherry".  If both
# conditions are met, it checks out branch B, cherry‑picks the merge (or squash)
# commit from the PR, and pushes the result back to the remote branch B.

name: cherry‑pick Cherry‑prefixed PRs to branch B

on:
  # Trigger on pull requests that are closed (merged or closed without merge).
  pull_request:
    types: [closed]
    # Only watch pull requests whose base branch is A.
    branches:
      - A

jobs:
  cherry_pick:
    # Only run if the pull request was merged AND its title starts with "Cherry".
    if: ${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'Cherry') }}
    runs-on: ubuntu-latest
    permissions:
      # Grant write permissions so the workflow can push to the repository.
      contents: write

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v3
        with:
          # A full fetch is required so that cherry‑picking works correctly.
          fetch-depth: 0
          # Use the GITHUB_TOKEN to authenticate against the repository.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git user
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Prepare target branch
        run: |
          # Fetch remote branches and create a local copy of B if it does not exist.
          git fetch origin
          if git show-ref --verify --quiet refs/heads/B; then
            echo "Local branch B exists."
          else
            # Create B from origin/B if it exists or from current HEAD otherwise.
            if git ls-remote --exit-code --heads origin B; then
              git checkout -b B origin/B
            else
              # If B doesn’t exist remotely, create it from branch A’s latest state.
              git checkout -b B origin/A
              git push --set-upstream origin B
            fi
          fi

      - name: Cherry‑pick the merged commit into B
        run: |
          # Switch to B
          git checkout B
          # Determine the commit to cherry‑pick.  When a PR is merged as a
          # merge commit or squash commit, merge_commit_sha contains the commit
          # on the base branch.  For rebased merges, fall back to the PR head.
          commit_sha="${{ github.event.pull_request.merge_commit_sha }}"
          if [ -z "$commit_sha" ]; then
            echo "merge_commit_sha is empty, using head SHA instead."
            commit_sha="${{ github.event.pull_request.head.sha }}"
          fi
          echo "Cherry‑picking commit $commit_sha into B"
          # Attempt the cherry‑pick.  Use the recursive merge strategy with the
          # `-X theirs` option to automatically resolve conflicts in favour of
          # the incoming commit.  This leverages `git cherry-pick --strategy=recursive -X theirs`
          # documented in Git merge strategies【901651621873494†L170-L178】【652661420902468†L20-L35】 to force the
          # cherry‑pick by choosing the changes from the source commit whenever
          # conflicts occur.  If even this forced strategy fails (e.g. due to
          # unresolved conflicts), abort to avoid a partial state.
          # Determine if the commit is a merge commit.  If it has multiple parents,
          # take the second parent (which represents the head of the feature branch)
          # instead of the merge commit itself.  This ensures we cherry‑pick the
          # actual changes from the pull request rather than the merge commit.
          parents=$(git show -s --format=%P "$commit_sha")
          parent_count=$(echo "$parents" | wc -w)
          if [ "$parent_count" -gt 1 ]; then
            parent2=$(echo "$parents" | awk '{print $2}')
            echo "Commit $commit_sha is a merge commit; using second parent $parent2 for cherry-pick."
            commit_sha="$parent2"
          fi

          # Perform the cherry‑pick.  We do not specify -m since we are now using a
          # non‑merge commit.  If conflicts occur, abort and fail the job.
          if git cherry-pick --strategy=recursive -X theirs -x "$commit_sha"; then
            echo "Cherry‑pick succeeded using recursive strategy with -X theirs."
          else
            echo "Conflict detected during forced cherry‑pick.  Aborting…" >&2
            git cherry-pick --abort
            exit 1
          fi

      - name: Push changes to B
        run: |
          git push origin B
