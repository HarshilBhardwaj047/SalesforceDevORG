name: Auto Cherry-Pick PRs to Branch B

on:
  pull_request:
    types:
      - closed
    branches:
      - A   # 👈 Change this to your source branch name

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Cherry')

    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: B                             # 👈 Change this to your target branch name
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Cherry-pick onto target branch
        id: cherry_pick
        run: |
          echo "PR #${PR_NUMBER}: '${PR_TITLE}'"
          echo "Commit : ${MERGE_COMMIT}"
          echo "Target : ${TARGET_BRANCH}"

          git checkout "${TARGET_BRANCH}"
          git pull origin "${TARGET_BRANCH}"

          # %P prints all parent SHAs space-separated; wc -w counts them.
          # This works on any already-fetched commit without grep exit-code issues.
          PARENT_COUNT=$(git log --pretty=format:'%P' -n 1 "${MERGE_COMMIT}" | wc -w)
          echo "Parent count: ${PARENT_COUNT}"

          PICK_OK=false

          if [ "${PARENT_COUNT}" -gt 1 ]; then
            echo "Merge commit — running: git cherry-pick -m 1 ${MERGE_COMMIT}"
            git cherry-pick -m 1 "${MERGE_COMMIT}" && PICK_OK=true || PICK_OK=false
          else
            echo "Regular commit — running: git cherry-pick ${MERGE_COMMIT}"
            git cherry-pick "${MERGE_COMMIT}" && PICK_OK=true || PICK_OK=false
          fi

          if [ "${PICK_OK}" = "true" ]; then
            echo "status=success" >> "${GITHUB_OUTPUT}"
            echo "Cherry-pick succeeded."
          else
            echo "status=conflict" >> "${GITHUB_OUTPUT}"
            echo "Cherry-pick failed."

            if git rev-parse CHERRY_PICK_HEAD > /dev/null 2>&1; then
              git cherry-pick --abort
              echo "Aborted cleanly."
            else
              echo "No in-progress pick to abort."
            fi
          fi

      - name: Push to target branch
        if: steps.cherry_pick.outputs.status == 'success'
        run: git push origin "${TARGET_BRANCH}"

      - name: Comment on PR — success
        if: steps.cherry_pick.outputs.status == 'success'
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "✅ **Cherry-pick succeeded!**
            Commit \`${MERGE_COMMIT}\` was automatically cherry-picked onto \`${TARGET_BRANCH}\`."

      - name: Comment on PR — conflict
        if: steps.cherry_pick.outputs.status == 'conflict'
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "⚠️ **Cherry-pick failed — manual steps needed.**

            \`\`\`bash
            git fetch origin
            git checkout ${TARGET_BRANCH}
            git pull origin ${TARGET_BRANCH}
            git cherry-pick -m 1 ${MERGE_COMMIT}
            # resolve conflicts, then:
            git add .
            git cherry-pick --continue
            git push origin ${TARGET_BRANCH}
            \`\`\`"

      - name: Fail job on conflict
        if: steps.cherry_pick.outputs.status == 'conflict'
        run: exit 1
