name: Auto Cherry-Pick PRs to Branch B

on:
  pull_request:
    types:
      - closed
    branches:
      - A   # 👈 Change this to your source branch name

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick:
    # Only run if the PR was actually merged AND title starts with "Cherry"
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Cherry')

    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: B                             # 👈 Change this to your target branch name
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                           # Full history required for cherry-pick
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Cherry-pick onto target branch
        id: cherry_pick
        run: |
          echo "🍒 Cherry-picking PR #${PR_NUMBER}: '${PR_TITLE}'"
          echo "   Commit : ${MERGE_COMMIT}"
          echo "   Target : ${TARGET_BRANCH}"

          git checkout "${TARGET_BRANCH}"
          git pull origin "${TARGET_BRANCH}"

          # ── Detect whether this is a merge commit ─────────────────────────────
          PARENT_COUNT=$(git cat-file -p "${MERGE_COMMIT}" | grep -c '^parent ')
          echo "   Parent count: ${PARENT_COUNT}"

          if [ "${PARENT_COUNT}" -gt 1 ]; then
            # Merge commit → must supply -m 1 (use branch-A side as mainline)
            CHERRY_CMD="git cherry-pick -m 1 ${MERGE_COMMIT}"
          else
            # Regular / squash commit → no -m flag needed
            CHERRY_CMD="git cherry-pick ${MERGE_COMMIT}"
          fi

          echo "   Running: ${CHERRY_CMD}"

          # ── Run cherry-pick ───────────────────────────────────────────────────
          if ${CHERRY_CMD}; then
            echo "status=success" >> "${GITHUB_OUTPUT}"
            echo "✅ Cherry-pick succeeded."
          else
            echo "status=conflict" >> "${GITHUB_OUTPUT}"
            echo "⚠️  Cherry-pick produced conflicts — aborting."

            # Only abort if a cherry-pick is actually in progress
            if git rev-parse CHERRY_PICK_HEAD > /dev/null 2>&1; then
              git cherry-pick --abort
            else
              echo "   Nothing to abort (cherry-pick failed before writing CHERRY_PICK_HEAD)."
            fi
          fi

      - name: Push to target branch (success)
        if: steps.cherry_pick.outputs.status == 'success'
        run: |
          git push origin "${TARGET_BRANCH}"
          echo "🚀 Pushed cherry-pick to ${TARGET_BRANCH}"

      - name: Comment on PR — success
        if: steps.cherry_pick.outputs.status == 'success'
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "✅ **Cherry-pick succeeded!**
            Commit \`${MERGE_COMMIT}\` was automatically cherry-picked onto \`${TARGET_BRANCH}\`."

      - name: Comment on PR — conflict
        if: steps.cherry_pick.outputs.status == 'conflict'
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "⚠️ **Cherry-pick failed — manual intervention needed.**

            Could not automatically apply \`${MERGE_COMMIT}\` onto \`${TARGET_BRANCH}\`.

            Run these commands locally to resolve:
            \`\`\`bash
            git fetch origin
            git checkout ${TARGET_BRANCH}
            git pull origin ${TARGET_BRANCH}
            git cherry-pick -m 1 ${MERGE_COMMIT}
            # Fix conflicts, then:
            git add .
            git cherry-pick --continue
            git push origin ${TARGET_BRANCH}
            \`\`\`"

      - name: Fail the job on conflict
        if: steps.cherry_pick.outputs.status == 'conflict'
        run: exit 1
