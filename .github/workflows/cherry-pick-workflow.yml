name: Auto Cherry-Pick PRs to Branch B

on:
  pull_request:
    types:
      - closed
    branches:
      - A   # 👈 Change this to your source branch name

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick:
    # Only run if the PR was actually merged (not just closed) AND title starts with "Cherry"
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Cherry')

    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: B            # 👈 Change this to your target branch name
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                 # Full history needed for cherry-pick
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Cherry-pick merge commit onto target branch
        id: cherry_pick
        run: |
          echo "🍒 Cherry-picking PR #$PR_NUMBER: '$PR_TITLE'"
          echo "   Merge commit : $MERGE_COMMIT"
          echo "   Target branch: $TARGET_BRANCH"

          git checkout "$TARGET_BRANCH"
          git pull origin "$TARGET_BRANCH"

          # -m 1 selects the first parent (the target branch line) as mainline,
          # which is required when cherry-picking a merge commit.
          if git cherry-pick -m 1 "$MERGE_COMMIT"; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "✅ Cherry-pick succeeded."
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "⚠️  Cherry-pick produced conflicts."
            git cherry-pick --abort || true
          fi

      - name: Push to target branch (success path)
        if: steps.cherry_pick.outputs.status == 'success'
        run: |
          git push origin "$TARGET_BRANCH"
          echo "🚀 Pushed cherry-pick to $TARGET_BRANCH"

      - name: Comment on PR — success
        if: steps.cherry_pick.outputs.status == 'success'
        run: |
          gh pr comment "$PR_NUMBER" --body \
            "✅ **Cherry-pick succeeded!**
            Merge commit \`$MERGE_COMMIT\` has been automatically cherry-picked onto \`$TARGET_BRANCH\`."

      - name: Comment on PR — conflict
        if: steps.cherry_pick.outputs.status == 'conflict'
        run: |
          gh pr comment "$PR_NUMBER" --body \
            "⚠️ **Cherry-pick failed due to conflicts.**
            Could not automatically apply \`$MERGE_COMMIT\` onto \`$TARGET_BRANCH\`.
            Please cherry-pick this commit manually and resolve the conflicts:
            \`\`\`bash
            git checkout $TARGET_BRANCH
            git cherry-pick -m 1 $MERGE_COMMIT
            # resolve conflicts, then:
            git cherry-pick --continue
            git push origin $TARGET_BRANCH
            \`\`\`"

      - name: Fail job if cherry-pick had conflicts
        if: steps.cherry_pick.outputs.status == 'conflict'
        run: exit 1
