name: Auto Cherry-Pick PRs to Branch B

on:
  pull_request:
    types:
      - closed
    branches:
      - A   # 👈 Change this to your source branch name

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Cherry')

    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: B
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Cherry-pick onto target branch
        id: cherry_pick
        run: |
          set -euo pipefail

          echo "🍒 PR #${PR_NUMBER}: '${PR_TITLE}'"
          echo "   Commit : ${MERGE_COMMIT}"
          echo "   Target : ${TARGET_BRANCH}"

          git checkout "${TARGET_BRANCH}"
          git pull origin "${TARGET_BRANCH}"

          # Count parents — || true prevents grep exit-code 1 (0 matches) from
          # killing the script when pipefail is active.
          PARENT_COUNT=$(git cat-file -p "${MERGE_COMMIT}" | grep -c '^parent ' || true)
          echo "   Parent count: ${PARENT_COUNT}"

          # ── Attempt the cherry-pick ──────────────────────────────────────────
          PICK_OK=false
          if [ "${PARENT_COUNT}" -gt 1 ]; then
            echo "   Merge commit detected → using -m 1"
            git cherry-pick -m 1 "${MERGE_COMMIT}" && PICK_OK=true || true
          else
            echo "   Regular/squash commit → no -m flag"
            git cherry-pick "${MERGE_COMMIT}"        && PICK_OK=true || true
          fi

          # ── Handle outcome ───────────────────────────────────────────────────
          if [ "${PICK_OK}" = "true" ]; then
            echo "status=success" >> "${GITHUB_OUTPUT}"
            echo "✅ Cherry-pick succeeded."
          else
            echo "status=conflict" >> "${GITHUB_OUTPUT}"
            echo "⚠️  Cherry-pick failed."

            # Abort only when a cherry-pick is actually in progress
            if git rev-parse CHERRY_PICK_HEAD > /dev/null 2>&1; then
              git cherry-pick --abort
              echo "   Aborted cleanly."
            else
              echo "   No in-progress pick to abort."
            fi
          fi

      - name: Push to target branch
        if: steps.cherry_pick.outputs.status == 'success'
        run: |
          git push origin "${TARGET_BRANCH}"
          echo "🚀 Pushed to ${TARGET_BRANCH}"

      - name: Comment on PR — success
        if: steps.cherry_pick.outputs.status == 'success'
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "✅ **Cherry-pick succeeded!**
            Commit \`${MERGE_COMMIT}\` was automatically cherry-picked onto \`${TARGET_BRANCH}\`."

      - name: Comment on PR — conflict
        if: steps.cherry_pick.outputs.status == 'conflict'
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "⚠️ **Cherry-pick failed — manual steps needed.**

            \`\`\`bash
            git fetch origin
            git checkout ${TARGET_BRANCH}
            git pull origin ${TARGET_BRANCH}
            git cherry-pick -m 1 ${MERGE_COMMIT}
            # resolve conflicts, then:
            git add .
            git cherry-pick --continue
            git push origin ${TARGET_BRANCH}
            \`\`\`"

      - name: Fail job on conflict
        if: steps.cherry_pick.outputs.status == 'conflict'
        run: exit 1
